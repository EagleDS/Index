<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Results — CGS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080a;--surf:#0f0f12;--surf2:#16161a;--border:#222228;--dim:#3a3a42;
  --text:#f0f0f4;--muted:#64646e;
  --gold:#f0b429;--gold-dk:#c89010;--gold-bg:#120e00;
  --red:#e03030;--green:#20b040;--green-bg:#021008;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:2px;height:2px}::-webkit-scrollbar-thumb{background:#333}
.hdr{background:#0a0a0d;border-bottom:2px solid var(--gold);padding:0 14px;height:48px;box-sizing:border-box;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--gold);flex:1}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.sync-dot.err{background:var(--red)}
.tabs{display:flex;gap:2px;padding:12px 12px 0;border-bottom:1px solid var(--border)}
.tab-btn{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:1px;padding:8px 14px;color:var(--muted);border-radius:2px 2px 0 0;-webkit-tap-highlight-color:transparent}
.tab-btn.on{background:var(--surf2);color:var(--gold)}
.body{padding:12px;max-width:700px;margin:0 auto}
.panel{display:none}
.panel.on{display:block}
.sec-hdr{background:#0d0d10;border-left:3px solid var(--gold);padding:8px 12px;margin-bottom:3px}
.sec-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold)}
.res-row{background:var(--surf);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:3px;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.empty{text-align:center;color:var(--muted);font-family:var(--mono);font-size:10px;padding:30px 10px}
.stand-card{background:var(--surf);border:1px solid var(--border);border-radius:3px;margin-bottom:6px;overflow:hidden}
.stand-card-hdr{background:#0d0d10;padding:7px 12px}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:8px;color:var(--muted);padding:4px 10px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:5px 10px;border-bottom:1px solid #111115}
.note{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:10px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🏆 RESULTS</div>
  <div class="sync-dot" id="sync-dot" title="Firebase sync"></div>
</div>

<div class="tabs">
  <button id="tab-recent" class="tab-btn on" onclick="goTab('recent')">RECENT</button>
  <button id="tab-standings" class="tab-btn" onclick="goTab('standings')">STANDINGS</button>
  <button id="tab-byclub" class="tab-btn" onclick="goTab('byclub')">BY CLUB</button>
  <button id="tab-overall" class="tab-btn" onclick="goTab('overall')">EAGLE CUP</button>
</div>

<div class="body">
  <div id="panel-recent" class="panel on">
    <div id="recent-body"></div>
    <div id="recent-empty" class="empty" style="display:none">No completed bouts yet.</div>
  </div>
  <div id="panel-standings" class="panel">
    <div class="note">Win 3pts · Loss 1pt · grouped by discipline / age group / division</div>
    <div id="standings-body"></div>
    <div id="standings-empty" class="empty" style="display:none">No completed bouts yet.</div>
  </div>
  <div id="panel-byclub" class="panel">
    <div class="note">Winning fighters, grouped by club</div>
    <div id="byclub-body"></div>
    <div id="byclub-empty" class="empty" style="display:none">No completed bouts yet.</div>
  </div>
  <div id="panel-overall" class="panel">
    <div class="note">Win 3pts · Loss 1pt · every discipline combined, duplicate names consolidated</div>
    <div id="overall-body"></div>
    <div id="overall-empty" class="empty" style="display:none">No completed bouts yet.</div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const params = new URLSearchParams(location.search);
const eventId = params.get('event') || 'cgs-july-11-2026';
const STYLE_ORDER=['Hybrid Light','MMA','K1 Light','Boxing Light'];

let bouts = [], nameMerges = {};

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function normS(s){return String(s||'').trim().toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}
function jaccardSim(a,b){const sa=new Set(a.split(' ').filter(x=>x.length>1));const sb=new Set(b.split(' ').filter(x=>x.length>1));if(!sa.size&&!sb.size)return 1;let inter=0;sa.forEach(w=>{if(sb.has(w))inter++;});return inter/(sa.size+sb.size-inter||1);}
function updateSyncDot(state){const d=document.getElementById('sync-dot');if(d)d.className='sync-dot '+state;}

window.goTab=function(tab){
  ['recent','standings','byclub','overall'].forEach(t=>{
    document.getElementById('panel-'+t).classList.toggle('on',t===tab);
    document.getElementById('tab-'+t).classList.toggle('on',t===tab);
  });
};

function renderRecent(){
  const dn=bouts.filter(b=>b.status==='completed').slice().reverse();
  const el=document.getElementById('recent-body'),empty=document.getElementById('recent-empty');
  if(!dn.length){el.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  el.innerHTML=dn.map(b=>{
    const wname=b.winner==='draw'?'DRAW':b.winner==='red'?b.red.name:b.blue.name;
    return '<div class="res-row">'
      +'<div style="font-family:var(--mono);font-size:8px;color:var(--gold);min-width:70px">'+escH(b.disc)+'</div>'
      +'<div style="font-size:10px;color:var(--muted);min-width:60px">'+escH(b.ageGrp)+'</div>'
      +'<div style="flex:1;min-width:140px">'
      +'<span style="font-weight:'+(b.winner==='red'?700:400)+';color:'+(b.winner==='red'?'var(--text)':'var(--muted)')+'">'+escH(b.red.name)+'</span>'
      +'<span style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:var(--green);margin:0 6px">'+b.score.red+'–'+b.score.blue+'</span>'
      +'<span style="font-weight:'+(b.winner==='blue'?700:400)+';color:'+(b.winner==='blue'?'var(--text)':'var(--muted)')+'">'+escH(b.blue.name)+'</span>'
      +'</div>'
      +'<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--green)">'+escH(wname)+'</div>'
      +'</div>';
  }).join('');
}

function computeStandings(){
  const completed=bouts.filter(b=>b.status==='completed');
  const groups={};
  completed.forEach(b=>{
    const key=b.disc+'|'+b.ageGrp+'|'+b.div;
    if(!groups[key])groups[key]={disc:b.disc,ageGrp:b.ageGrp,div:b.div,athletes:{}};
    const g=groups[key];
    const ensure=(name,club)=>{if(!g.athletes[name])g.athletes[name]={name,club,points:0,w:0,l:0,d:0};return g.athletes[name];};
    const red=ensure(b.red.name,b.red.club);
    const blue=ensure(b.blue.name,b.blue.club);
    if(b.winner==='red'){red.points+=3;red.w++;blue.points+=1;blue.l++;}
    else if(b.winner==='blue'){blue.points+=3;blue.w++;red.points+=1;red.l++;}
    else{red.d++;blue.d++;}
  });
  return groups;
}

function renderStandings(){
  const groups=computeStandings();
  const body=document.getElementById('standings-body'),empty=document.getElementById('standings-empty');
  const keys=Object.keys(groups);
  if(!keys.length){body.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const agO={'Under 12':0,'13-17':1,'Adult':2};
  keys.sort((a,b)=>{
    const ga=groups[a],gb=groups[b];
    const di=STYLE_ORDER.indexOf(ga.disc)-STYLE_ORDER.indexOf(gb.disc);
    if(di!==0)return di;
    const ai=(agO[ga.ageGrp]??2)-(agO[gb.ageGrp]??2);
    if(ai!==0)return ai;
    return ga.div==='Female'?-1:1;
  });
  let html='',lastDisc='';
  keys.forEach(key=>{
    const g=groups[key];
    if(g.disc!==lastDisc){html+='<div class="sec-hdr" style="margin-top:'+(lastDisc?'16px':'0')+'"><div class="sec-name">'+escH(g.disc)+'</div></div>';lastDisc=g.disc;}
    const list=Object.values(g.athletes).sort((a,b)=>b.points-a.points||b.w-a.w);
    html+='<div class="stand-card"><div class="stand-card-hdr"><div style="font-family:\'Bebas Neue\',sans-serif;font-size:15px;letter-spacing:1px;color:'+(g.div==='Female'?'#c060c0':'#4090d0')+'">'+escH(g.ageGrp)+' · '+escH(g.div)+'</div></div>'
      +'<table><thead><tr><th>NAME</th><th>CLUB</th><th style="text-align:right">W-L</th><th style="text-align:right">PTS</th></tr></thead><tbody>';
    list.forEach((a,idx)=>{
      const isTop=idx===0&&a.points>0;
      html+='<tr'+(isTop?' style="background:var(--gold-bg)"':'')+'>'
        +'<td style="font-weight:600;color:'+(isTop?'var(--gold)':'var(--text)')+'">'+(isTop?'★ ':'')+escH(a.name)+'</td>'
        +'<td style="font-size:10px;color:var(--muted)">'+escH(a.club||'')+'</td>'
        +'<td style="font-family:var(--mono);font-size:10px;text-align:right;color:var(--muted)">'+a.w+'-'+a.l+(a.d?'-'+a.d+'D':'')+'</td>'
        +'<td style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;text-align:right;color:'+(isTop?'var(--gold)':'var(--text)')+'">'+a.points+'</td>'
        +'</tr>';
    });
    html+='</tbody></table></div>';
  });
  body.innerHTML=html;
}

function computeWinnersByClub(){
  const clubs={};
  bouts.filter(b=>b.status==='completed'&&(b.winner==='red'||b.winner==='blue')).forEach(b=>{
    const winner=b[b.winner],loser=b[b.winner==='red'?'blue':'red'];
    const club=winner.club||'Independent';
    if(!clubs[club])clubs[club]=[];
    const wScore=b.winner==='red'?b.score.red:b.score.blue;
    const lScore=b.winner==='red'?b.score.blue:b.score.red;
    clubs[club].push({name:winner.name,disc:b.disc,ageGrp:b.ageGrp,div:b.div,score:wScore+'-'+lScore,beat:loser.name});
  });
  return clubs;
}

function renderWinnersByClub(){
  const clubs=computeWinnersByClub();
  const body=document.getElementById('byclub-body'),empty=document.getElementById('byclub-empty');
  const names=Object.keys(clubs).sort((a,b)=>a.localeCompare(b));
  if(!names.length){body.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  let html='';
  names.forEach(club=>{
    const wins=clubs[club].sort((a,b)=>a.disc.localeCompare(b.disc)||a.name.localeCompare(b.name));
    html+='<div class="sec-hdr"><div class="sec-name">'+escH(club)+'</div><div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px">'+wins.length+' win'+(wins.length!==1?'s':'')+'</div></div>';
    html+='<div class="stand-card"><table><thead><tr><th>FIGHTER</th><th>CATEGORY</th><th>BEAT</th><th style="text-align:right">SCORE</th></tr></thead><tbody>';
    wins.forEach(w=>{
      html+='<tr>'
        +'<td style="font-weight:600;color:var(--gold)">★ '+escH(w.name)+'</td>'
        +'<td style="font-size:10px;color:var(--muted)">'+escH(w.disc)+' · '+escH(w.ageGrp)+' · '+escH(w.div)+'</td>'
        +'<td style="font-size:10px;color:var(--muted)">'+escH(w.beat)+'</td>'
        +'<td style="font-family:var(--mono);font-size:10px;text-align:right;color:var(--green)">'+w.score+'</td>'
        +'</tr>';
    });
    html+='</tbody></table></div>';
  });
  body.innerHTML=html;
}

function computeEagleCupLeaderboard(){
  const completed=bouts.filter(b=>b.status==='completed'&&(b.winner==='red'||b.winner==='blue'));
  const raw={};
  const ensure=(name,club)=>{if(!raw[name])raw[name]={name,club,points:0,w:0,l:0};return raw[name];};
  completed.forEach(b=>{
    const red=ensure(b.red.name,b.red.club);
    const blue=ensure(b.blue.name,b.blue.club);
    if(b.winner==='red'){red.points+=3;red.w++;blue.points+=1;blue.l++;}
    else{blue.points+=3;blue.w++;red.points+=1;red.l++;}
  });
  const rawList=Object.values(raw);
  const clusters=[];
  rawList.forEach(entry=>{
    const manualTarget=nameMerges[entry.name];
    let matched=null;
    if(manualTarget)matched=clusters.find(c=>c.canonicalName===manualTarget||c.members.includes(manualTarget));
    if(!matched){
      for(const c of clusters){
        if(jaccardSim(normS(entry.name),normS(c.canonicalName))>=0.6){matched=c;break;}
      }
    }
    if(matched){
      matched.points+=entry.points;matched.w+=entry.w;matched.l+=entry.l;
      matched.members.push(entry.name);
      if(manualTarget)matched.canonicalName=manualTarget;
      else if(entry.name.length>matched.canonicalName.length)matched.canonicalName=entry.name;
    }else{
      clusters.push({canonicalName:manualTarget||entry.name,club:entry.club,points:entry.points,w:entry.w,l:entry.l,members:[entry.name]});
    }
  });
  return clusters.sort((a,b)=>b.points-a.points||b.w-a.w);
}

function renderEagleCupLeaderboard(){
  const list=computeEagleCupLeaderboard();
  const body=document.getElementById('overall-body'),empty=document.getElementById('overall-empty');
  if(!list.length){body.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  let html='<div class="stand-card"><table><thead><tr><th>#</th><th>NAME</th><th>CLUB</th><th style="text-align:right">W-L</th><th style="text-align:right">PTS</th></tr></thead><tbody>';
  list.forEach((c,idx)=>{
    const rank=idx+1,isTop3=rank<=3,medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    const hasVariants=c.members.length>1;
    html+='<tr'+(isTop3?' style="background:var(--gold-bg)"':'')+'>'
      +'<td style="font-family:var(--mono);color:var(--muted)">'+rank+'</td>'
      +'<td style="font-weight:600;color:'+(isTop3?'var(--gold)':'var(--text)')+'">'+medal+(medal?' ':'')+escH(c.canonicalName)+(hasVariants?'<div style="font-family:var(--mono);font-size:8px;color:var(--muted);font-weight:400">'+c.members.length+' combined</div>':'')+'</td>'
      +'<td style="font-size:10px;color:var(--muted)">'+escH(c.club||'')+'</td>'
      +'<td style="font-family:var(--mono);font-size:10px;text-align:right;color:var(--muted)">'+c.w+'-'+c.l+'</td>'
      +'<td style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;text-align:right;color:'+(isTop3?'var(--gold)':'var(--text)')+'">'+c.points+'</td>'
      +'</tr>';
  });
  html+='</tbody></table></div>';
  body.innerHTML=html;
}

function renderAll(){renderRecent();renderStandings();renderWinnersByClub();renderEagleCupLeaderboard();}

function initFirebase(){
  const cfg={
    apiKey:"AIzaSyDKqodxFjM0EG_qu4zkCAQ37udwYTdSSQY",
    authDomain:"cgs-manager.firebaseapp.com",
    databaseURL:"https://cgs-manager-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"cgs-manager",
    storageBucket:"cgs-manager.firebasestorage.app",
    messagingSenderId:"928662574013",
    appId:"1:928662574013:web:be540e308d022d28f678d4"
  };
  try{
    const existing=getApps().find(a=>a.name==='cgs-results');
    const app=existing||initializeApp(cfg,'cgs-results');
    const db=getDatabase(app);
    updateSyncDot('live');
    onValue(ref(db,`events/${eventId}/bouts`),snap=>{
      if(!snap.exists())return;
      const data=snap.val();
      if(Array.isArray(data)){bouts=data;renderAll();}
    });
    onValue(ref(db,`events/${eventId}/nameMerges`),snap=>{
      nameMerges=snap.exists()?(snap.val()||{}):{};
      renderAll();
    });
  }catch(e){updateSyncDot('err');console.warn(e);}
}

initFirebase();
</script>
</body>
</html>
