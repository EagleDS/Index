<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Live Draw — Combat Games Series | Eagle DS</title>
<link rel="icon" href="https://eagleds.co.nz/logo.PNG"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0d;--border:#1e1e26;
  --text:#f0f0f4;--muted:#64646e;
  --gold:#f0b429;--gold-bg:rgba(240,180,41,.06);
  --mono:'IBM Plex Mono',monospace;--bebas:'Bebas Neue',sans-serif;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}
.nav{background:#0a0a0d;border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav-brand{font-family:var(--bebas);font-size:16px;letter-spacing:2px;color:var(--gold);margin-right:12px;flex-shrink:0}
.nav a,.nav button{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-radius:2px;background:none;border:1px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav a:hover,.nav button:hover{color:var(--text);border-color:var(--border)}
.nav .results-link{color:var(--gold);border:1px solid rgba(240,180,41,.3);background:var(--gold-bg);margin-left:auto}
.frame-wrap{flex:1;min-height:0}
iframe{width:100%;height:100%;border:none;display:block}
@media print{.nav{display:none}}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">⚔ EAGLE DS</span>
  <a href="https://eagleds.co.nz/cgs.html">← Back</a>
  <a href="https://eagleds.co.nz/mat1.html">Mat 1</a>
  <a href="https://eagleds.co.nz/mat2.html">Mat 2</a>
  <button onclick="window.print()">🖨 Print Draw</button>
  <a href="https://eagleds.co.nz/results.html" class="results-link">🏆 Results</a>
</nav>

<div class="frame-wrap">
  <iframe src="https://eagleds.github.io/CGS-manager/public.html?event=cgs-july-11-2026" title="Live Draw"></iframe>
</div>

</body>
</html>
